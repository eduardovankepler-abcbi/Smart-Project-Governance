services:
  - type: web
    name: smart-project-governance-api
    runtime: node
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL_MODE
        value: disabled
      - key: DB_SSL_CA
        sync: false
      - key: API_KEY
        sync: false
      - key: ENABLE_GLOBAL_API_KEY
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: IMPORT_MAX_FILE_SIZE_MB
        value: 25
      - key: SUPABASE_SYNC_ENABLED
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
