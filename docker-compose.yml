services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-abc123}
      MYSQL_DATABASE: abc_project_manager
      MYSQL_USER: ${DB_USER:-abc_app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-abc_secure_pass}
    volumes:
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-abc_app_user}
      DB_PASSWORD: ${DB_PASSWORD:-abc_secure_pass}
      DB_NAME: abc_project_manager
      PORT: 3001
      API_KEY: ${API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      IMPORT_MAX_FILE_SIZE_MB: ${IMPORT_MAX_FILE_SIZE_MB:-25}
      SUPABASE_SYNC_ENABLED: ${SUPABASE_SYNC_ENABLED:-false}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
